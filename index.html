<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Malla Curricular Odontología</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fb;
margin:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.year{

margin-bottom:50px;

}

.yearTitle{

font-size:22px;
margin-bottom:15px;
color:#2c3e50;
border-left:6px solid #3498db;
padding-left:10px;

}

.grid{

display:flex;
gap:18px;
overflow-x:auto;

}

.cycle{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
width:260px;
flex-shrink:0;

}

.cycle h3{

text-align:center;
color:#34495e;
border-bottom:1px solid #eee;
padding-bottom:8px;

}

.subject{

background:#e8f0fe;
margin:6px 0;
padding:10px;
border-radius:8px;
cursor:pointer;
transition:.25s;
font-size:13px;

}

.subject small{

display:block;
font-size:11px;
color:#666;
margin-top:4px;

}

.subject:hover{

transform:scale(1.02);

}

.approved{

background:#b8f2d0;
text-decoration:line-through;

}

.locked{

background:#e0e0e0;
cursor:not-allowed;
color:#777;

}

.tooltip{

position:relative;

}

.tooltip:hover::after{

content:attr(data-tooltip);

position:absolute;

bottom:105%;

left:0;

background:#2c3e50;

color:white;

padding:7px;

border-radius:6px;

font-size:12px;

width:220px;

}

button{

margin-bottom:20px;
background:#3498db;
border:none;
color:white;
padding:8px 15px;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#2980b9;

}

</style>

</head>

<body>

<h1>Malla Curricular Odontología</h1>

<button onclick="resetProgress()">Reiniciar progreso</button>

<div id="grid"></div>

<script>

const years=[

{
year:"Primer Año",

cycles:[

{
name:"Ciclo I",

subjects:[

{name:"Biologia General"},
{name:"Quimica General"},
{name:"Anatomia Dental"},
{name:"Metodos de Redaccion e Informatica"}

]

},

{
name:"Ciclo II",

subjects:[

{name:"Anatomia Humana",req:["Biologia General"]},
{name:"Quimica Organica",req:["Quimica General"]},
{name:"Histologia y Embriologia de la Cavidad Bucal",req:["Anatomia Dental"]},
{name:"Materiales Dentales",req:["Anatomia Dental"]},
{name:"Sociologia General"}

]

}

]

},

{
year:"Segundo Año",

cycles:[

{
name:"Ciclo III",

subjects:[

{name:"Anatoma De Cabeza y Cuello Neuroanatomía",req:["Anatomia Humana"]},
{name:"Bioquímica Medica",req:["Quimica Organica"]},
{name:"Microbiología Médica y Oral",req:["Histologia y Embriologia de la Cavidad Bucal"]},
{name:"Oclusión",req:["Materiales Dentales"]},
{name:"Ingles 1"}

]

},

{
name:"Ciclo IV",

subjects:[

{name:"Patología General",req:["Anatoma De Cabeza y Cuello Neuroanatomía"]},
{name:"Fisiologia Humana",req:["Bioquímica Medica"]},
{name:"Radiologia",req:["Oclusión"]},
{name:"Ética y Relaciones Internacionales",req:["Sociologia General"]},
{name:"Ingles 2",req:["Ingles 1"]}

]

}

]

}

];

let approved=JSON.parse(localStorage.getItem("approvedSubjects"))||[];

function save(){

localStorage.setItem("approvedSubjects",JSON.stringify(approved));

}

function tooltipText(missing){

if(missing.length<=3){

return "Falta: "+missing.join(", ");

}

return "Faltan "+missing.length+" materias";

}

function createGrid(){

let grid=document.getElementById("grid");

grid.innerHTML="";

years.forEach(year=>{

let yearDiv=document.createElement("div");

yearDiv.className="year";

let title=document.createElement("div");

title.className="yearTitle";

title.textContent=year.year;

yearDiv.appendChild(title);

let container=document.createElement("div");

container.className="grid";

year.cycles.forEach(cycle=>{

let div=document.createElement("div");

div.className="cycle";

let html="<h3>"+cycle.name+"</h3>";

cycle.subjects.forEach(sub=>{

let missing=[];

if(sub.req){

missing=sub.req.filter(r=>!approved.includes(r));

}

let locked=missing.length>0;

let classes="subject";

let tooltip="";

if(approved.includes(sub.name)){

classes+=" approved";

}

else if(locked){

classes+=" locked tooltip";

tooltip=tooltipText(missing);

}

let reqText="";

if(sub.req){

if(sub.req.length<=3){

reqText=sub.req.join(", ");

}else{

reqText="Requiere "+sub.req.length+" materias";

}

}

html+=`<div class="${classes}"
data-tooltip="${tooltip}"
onclick="toggle('${sub.name}',${locked})">

${sub.name}

<small>${reqText}</small>

</div>`;

});

div.innerHTML=html;

container.appendChild(div);

});

yearDiv.appendChild(container);

grid.appendChild(yearDiv);

});

}

function toggle(name,locked){

if(locked)return;

if(approved.includes(name)){

approved=approved.filter(x=>x!=name);

}else{

approved.push(name);

}

save();

createGrid();

}

function resetProgress(){

approved=[];

save();

createGrid();

}

createGrid();

</script>

</body>

</html>
