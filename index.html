<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Malla Curricular Odontología</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fb;
margin:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.grid{

display:grid;
grid-template-columns:repeat(14,260px);
gap:18px;
overflow-x:auto;
padding-bottom:20px;

}

.cycle{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
min-height:200px;

}

.cycle h3{

text-align:center;
color:#34495e;
border-bottom:1px solid #eee;
padding-bottom:8px;

}

.subject{

background:#e8f0fe;
margin:6px 0;
padding:10px;
border-radius:8px;
cursor:pointer;
transition:.25s;
font-size:13px;

}

.subject:hover{

transform:scale(1.02);

}

.approved{

background:#b8f2d0;
text-decoration:line-through;

}

.locked{

background:#e0e0e0;
cursor:not-allowed;
color:#777;

}

.tooltip{

position:relative;

}

.tooltip:hover::after{

content:attr(data-tooltip);

position:absolute;

bottom:105%;

left:0;

background:#2c3e50;

color:white;

padding:6px;

border-radius:6px;

font-size:12px;

width:210px;

}

button{

margin-bottom:20px;
background:#3498db;
border:none;
color:white;
padding:8px 15px;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#2980b9;

}

</style>

</head>

<body>

<h1>Malla Curricular Odontología</h1>

<button onclick="resetProgress()">Reiniciar progreso</button>

<div id="grid" class="grid"></div>

<script>

const curriculum=[

{cycle:"Ciclo I",
subjects:[
"Biologia General",
"Quimica General",
"Anatomia Dental",
"Metodos de Redaccion e Informatica"
]},

{cycle:"Ciclo II",
subjects:[
["Anatomia Humana",["Biologia General"]],
["Quimica Organica",["Quimica General"]],
["Histologia y Embriologia de la Cavidad Bucal",["Anatomia Dental"]],
["Materiales Dentales",["Anatomia Dental"]],
"Sociologia General"
]},

{cycle:"Ciclo III",
subjects:[
["Anatoma De Cabeza y Cuello Neuroanatomía",["Anatomia Humana"]],
["Bioquímica Medica",["Quimica Organica"]],
["Microbiología Médica y Oral",["Histologia y Embriologia de la Cavidad Bucal"]],
["Oclusión",["Materiales Dentales"]],
"Ingles 1"
]},

{cycle:"Ciclo IV",
subjects:[
["Patología General",["Anatoma De Cabeza y Cuello Neuroanatomía"]],
["Fisiologia Humana",["Bioquímica Medica"]],
["Radiologia",["Oclusión"]],
["Ética y Relaciones Internacionales",["Sociologia General"]],
["Ingles 2",["Ingles 1"]]
]},

{cycle:"Ciclo V",
subjects:[
["Patología Bucal I",["Patología General"]],
["Farmacología y Terapéutica",["Fisiologia Humana"]],
["Operatoria Dental I",["Radiologia"]],
["Psicología General Aplicada",["Ética y Relaciones Internacionales"]],
["Ingles 3",["Ingles 2"]]
]},

{cycle:"Ciclo VI",
subjects:[
["Patologia Bucal II",["Patología Bucal I"]],
["Medicina Interna",["Farmacología y Terapéutica"]],
["Operatoria Dental II",["Operatoria Dental I"]],
["Odontologia Preventiva",["Psicología General Aplicada"]],
["Ingles 4",["Ingles 3"]]
]},

{cycle:"Ciclo VII",
subjects:[
["Diagnóstico Bucal",["Patologia Bucal II"]],
["Bioseguridad",["Medicina Interna"]],
["Prótesis Parcial Fija I",["Operatoria Dental II"]],
["Prótesis Parcial Removible",["Operatoria Dental II"]],
["Prótesis Completa",["Operatoria Dental II","Odontologia Preventiva"]],
["Periodoncia I",["Patologia Bucal II"]]
]},

{cycle:"Ciclo VIII",
subjects:[
["Odontopediatría",["Diagnóstico Bucal","Prótesis Parcial Fija I"]],
["Ortodoncia",["Bioseguridad","Prótesis Parcial Fija I"]],
["Prótesis Parcial Fija II",["Prótesis Parcial Fija I"]],
["Endodoncia",["Prótesis Parcial Removible"]],
["Cirugía Bucal",["Prótesis Completa"]],
["Periodoncia II",["Periodoncia I"]]
]}

];

const allFirstToFourth = curriculum.flatMap(c=>c.subjects).map(s=>Array.isArray(s)?s[0]:s);

curriculum.push(

{
cycle:"Ciclo IX",
subjects:[
["Clínica De Odontropediatría y Ortodoncia I",allFirstToFourth],
["Clínica De Operatoria Dental I",allFirstToFourth],
["Clínica De Prostodoncia I",allFirstToFourth],
["Clínica De Endodoncia I",allFirstToFourth],
["Clínica De Cirugía Bucal I",allFirstToFourth],
["Clínica De Periodoncia I",allFirstToFourth],
["Clínica De Diagnóstico Bucal I",allFirstToFourth]
]},

{
cycle:"Ciclo X",
subjects:[
["Clínica De Odontropediatría y Ortodoncia II",["Clínica De Odontropediatría y Ortodoncia I"]],
["Clínica De Operatoria Dental II",["Clínica De Operatoria Dental I"]],
["Clínica De Prostodoncia II",["Clínica De Prostodoncia I"]],
["Clínica De Endodoncia II",["Clínica De Endodoncia I"]],
["Clínica De Cirugía Bucal II",["Clínica De Cirugía Bucal I"]],
["Clínica De Periodoncia II",["Clínica De Periodoncia I"]],
["Clínica De Diagnóstico Bucal II",["Clínica De Diagnóstico Bucal I"]]
]},

{
cycle:"Ciclo XI",
subjects:[
["Clínica De Odontropediatría y Ortodoncia III",["Clínica De Odontropediatría y Ortodoncia II"]],
["Clínica De Operatoria Dental III",["Clínica De Operatoria Dental II"]],
["Clínica De Prostodoncia III",["Clínica De Prostodoncia II"]],
["Clínica De Endodoncia III",["Clínica De Endodoncia II"]],
["Clínica De Cirugía Bucal III",["Clínica De Cirugía Bucal II"]],
["Clínica De Periodoncia III",["Clínica De Periodoncia II"]],
["Clínica De Diagnóstico Bucal III",["Clínica De Diagnóstico Bucal II"]]
]}

);

let approved=JSON.parse(localStorage.getItem("approvedSubjects"))||[];

function save(){

localStorage.setItem("approvedSubjects",JSON.stringify(approved));

}

function createGrid(){

let grid=document.getElementById("grid");

grid.innerHTML="";

curriculum.forEach(cycle=>{

let div=document.createElement("div");

div.className="cycle";

let html="<h3>"+cycle.cycle+"</h3>";

cycle.subjects.forEach(sub=>{

let name=Array.isArray(sub)?sub[0]:sub;

let req=Array.isArray(sub)?sub[1]:[];

let missing=req.filter(r=>!approved.includes(r));

let locked=missing.length>0;

let classes="subject";

let tooltip="";

if(approved.includes(name)){

classes+=" approved";

}

else if(locked){

classes+=" locked tooltip";

tooltip="Faltan "+missing.length+" materias";

}

html+=`<div class="${classes}"
data-tooltip="${tooltip}"
onclick="toggle('${name}',${locked})">

${name}

</div>`;

});

div.innerHTML=html;

grid.appendChild(div);

});

}

function toggle(name,locked){

if(locked)return;

if(approved.includes(name)){

approved=approved.filter(x=>x!=name);

}else{

approved.push(name);

}

save();

createGrid();

}

function resetProgress(){

approved=[];

save();

createGrid();

}

createGrid();

</script>

</body>

</html>
