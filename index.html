h1{
text-align:center;

.yearTitle{

font-size:22px;
margin-bottom:15px;
color:#2c3e50;
border-left:6px solid #91053b;

}

.grid{

display:flex;
gap:18px;
overflow-x:auto;
align-items:flex-start;

}

.yearBlock{

display:flex;
flex-direction:column;
flex-shrink:0;

}

.cycle{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
width:260px;
flex-shrink:0;
margin-bottom:18px;

}

.cycle h3{

text-align:center;
color:#34495e;
border-bottom:1px solid #eee;

}

.subject{

background:#f9e6ed;
margin:6px 0;
padding:10px;
border-radius:8px;
cursor:pointer;
transition:.25s;
font-size:13px;
position:relative;

}

.subject:hover{

transform:scale(1.02);

}

.approved{

background:#b8f2d0;
text-decoration:line-through;

}

.locked{

background:#e0e0e0;
cursor:not-allowed;
color:#777;

}

.tooltip:hover::after{

content:attr(data-tooltip);

position:absolute;

bottom:105%;

left:0;

background:#2c3e50;

color:white;

padding:7px;

border-radius:6px;

font-size:12px;

width:220px;

z-index:10;

}

button{

margin-bottom:20px;
background:#91053b;
border:none;
color:white;
padding:8px 15px;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#6e042d;

}

let approved=JSON.parse(localStorage.getItem("approvedSubjects"))||[];

function save(){
  localStorage.setItem("approvedSubjects",JSON.stringify(approved));
}

function tooltipText(sub, missing){
  if(sub.reqLabel){
    return "Requisito: "+sub.reqLabel;
  }
  if(!sub.req||sub.req.length===0) return "";
  if(sub.req.length<=3) return "Requisito: "+sub.req.join(", ");
  return "Requisito: "+sub.req.length+" materias";
}

function createGrid(){

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  years.forEach(year=>{

    let yearBlock=document.createElement("div");
    yearBlock.className="yearBlock";

    let title=document.createElement("div");
    title.className="yearTitle";
    title.textContent=year.year;
    yearBlock.appendChild(title);

    year.cycles.forEach(cycle=>{

      let div=document.createElement("div");
      div.className="cycle";

      let html="<h3>"+cycle.name+"</h3>";

      cycle.subjects.forEach(sub=>{

        let missing=[];
        if(sub.req){
          missing=sub.req.filter(r=>!approved.includes(r));
        }

        let locked=missing.length>0;
        let classes="subject tooltip";
        let tooltip=tooltipText(sub, missing);

        if(approved.includes(sub.name)){
          classes+=" approved";
          tooltip="";
        } else if(locked){
          classes+=" locked";
        }

        const safeName=sub.name.replace(/'/g,"\\'");

        html+=`<div class="${classes}" data-tooltip="${tooltip}" onclick="toggle('${safeName}',${locked})">${sub.name}</div>`;

      });

      div.innerHTML=html;
      yearBlock.appendChild(div);

    });

    grid.appendChild(yearBlock);

  });

}

function toggle(name,locked){
  if(locked)return;
  if(approved.includes(name)){
    approved=approved.filter(x=>x!=name);
  }else{
    approved.push(name);
  }
  save();
  createGrid();
}

function resetProgress(){
  approved=[];
  save();
  createGrid();
}

createGrid();
